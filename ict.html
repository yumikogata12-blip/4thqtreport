<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TLE-ICT | Quarters Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
    --matcha: #a8c69f;
    --strawberry: #ff85a2;
    --chocolate: #5d4037;
    --cream: #fdfcf0;
}

body {
    font-family: 'Quicksand', sans-serif;
    background-color: var(--cream);
    background-image: radial-gradient(#a8c69f 1px, transparent 1px);
    background-size: 30px 30px;
    margin: 0;
    padding: 40px;
}

.main-container {
    background: white;
    border: 6px solid var(--matcha);
    border-radius: 40px;
    padding: 40px;
    max-width: 800px;
    margin: 0 auto;
    box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
}

.quarter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
}

.divider {
    border-left: 3px dashed var(--strawberry);
    padding-left: 40px;
}

h1 {
    font-family: 'Fredoka One', cursive;
    color: var(--matcha);
    text-align: center;
    text-shadow: 2px 2px 0px var(--strawberry);
    font-size: 50px;
}

.left-align {
    text-align: left;
}

h2 { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--chocolate); }
h3 { font-size: 18px; color: var(--matcha); margin: 20px 0 10px 0; }
ul { list-style: none; padding: 0; }
li { margin-bottom: 8px; }

a {
    display: block;
    padding: 10px 20px;
    background: #f9f9f9;
    border-radius: 12px;
    text-decoration: none;
    color: var(--chocolate);
    font-weight: bold;
    border: 2px solid var(--matcha);
    transition: 0.2s;
}

a:hover { background: var(--matcha); color: white; }
.q4-link { border-color: var(--strawberry); }
.q4-link:hover { background: var(--strawberry); }

.back-home {
    display: block;
    width: fit-content;
    margin: 30px auto 0;
    padding: 12px 25px;
    background: var(--chocolate);
    color: white;
    border-radius: 20px;
    text-decoration: none;
}
</style>
</head>
<body>

<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .browser-frame {
            width: 600px;
            margin: 50px auto;
            border: 8px solid #8DA399;
            border-radius: 20px;
            background-color: #fff;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .browser-header {
            background-color: #F4C2C2;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-bottom: 3px solid #8DA399;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; }
        .content { padding: 30px; color: #4E6E5D; font-family: 'Segoe UI', sans-serif; }
        .label { font-weight: bold; margin-bottom: 5px; display: block; color: #8DA399; }
        img { width: 100%; height: auto; margin-bottom: 25px; border: 3px solid #F4C2C2; border-radius: 10px; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #F4C2C2;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .back-link:hover { color: #8DA399; cursor: pointer; }
    </style>
</head>
<body>
    <div class="browser-frame">
        <div class="browser-header">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="content">
            <h1>Project Documentation</h1>
            
            <span class="label">HTML Code 1</span>
            <img src="bo1html1.png" alt="HTML Code 1">
            
            <span class="label">HTML Code 2</span>
            <img src="bo1html2.png" alt="HTML Code 2">
            
            <span class="label">Browser Output</span>
            <img src="bo1.png" alt="Browser Output">

            <a href="ict.html" class="back-link">← Go Back</a>
        </div>
    </div>
</body>
</html>
